<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Crossover Apparel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Blurred backdrop simulating main page behind -->
    <div class="overlay-backdrop"></div>

    <div class="container">
        <div class="card">
            <div class="brand">
                <img src="images/crossoverlogo.png" alt="Crossover" class="brand-icon">
                <h1>Create account</h1>
                <p>Join Crossover Apparel today</p>
            </div>

            <form id="signupForm" method="POST" action="register.php" onsubmit="return validateForm()" autocomplete="off">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
                    <div class="error-text" id="fullnameError">Full name is required</div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email">
                    <div class="error-text" id="emailError">Please enter a valid email address</div>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username">
                    <div class="error-text" id="usernameError">Username is required (min 3 characters)</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password">
                    <div class="error-text" id="passwordError">Password must be at least 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password">
                    <div class="error-text" id="confirmError">Passwords do not match</div>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        function validateForm() {
            let isValid = true;
            document.querySelectorAll('.error-text').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));

            const fullname = document.getElementById('fullname');
            const email = document.getElementById('email');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirm_password');

            if (fullname.value.trim() === '') {
                showError('fullname', 'fullnameError');
                isValid = false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email.value.trim() === '' || !emailRegex.test(email.value.trim())) {
                showError('email', 'emailError');
                isValid = false;
            }

            if (username.value.trim() === '' || username.value.trim().length < 3) {
                showError('username', 'usernameError');
                isValid = false;
            }

            if (password.value.length < 6) {
                showError('password', 'passwordError');
                isValid = false;
            }

            if (confirm.value !== password.value || confirm.value === '') {
                showError('confirm_password', 'confirmError');
                isValid = false;
            }

            return isValid;
        }

        function showError(inputId, errorId) {
            document.getElementById(inputId).classList.add('error');
            document.getElementById(errorId).classList.add('show');
        }
    </script>
</body>

</html>
